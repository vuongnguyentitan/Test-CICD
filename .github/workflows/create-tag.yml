name: Create tag & release from commit

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Target commit SHA'
        required: true
        type: string
      tag_name:
        description: 'Tag name (e.g. v1.2.3)'
        required: true
        type: string
      release_name:
        description: 'Release title (defaults to tag name)'
        required: false
        type: string

permissions:
  contents: write  # needed to push tag & create release

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no need for full history unless you want)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag
        run: |
          git fetch --all --tags
          git tag "${{ github.event.inputs.tag_name }}" "${{ github.event.inputs.commit_sha }}"
          git push origin "${{ github.event.inputs.tag_name }}"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          release_name: ${{ github.event.inputs.release_name || github.event.inputs.tag_name }}
          target_commitish: ${{ github.event.inputs.commit_sha }}
